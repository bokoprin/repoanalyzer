  - id: tinyusb_descriptor_open_binds_endpoint_interface_maps
    kind: verify_claim
    claim:
      claim_type: tinyusb_driver_dispatch_semantic
      subject: drv_id
      object: tu_bind_driver_to_ep_itf
      payload:
        predicate: binds_driver_to_endpoint_interface_maps
