id: phase7_tinyusb_device_cdc_msc_profile_probe
description: TinyUSB device cdc_msc target-profile and compact real-repo-eval probe.
ingest:
  enabled: true
  config: repoanalyzer.yml
budgets:
  max_total_ms: 20000
  max_facts: 1500
  max_indexed_files: 20
expect:
  ingest:
    status: indexed
    min_files: 9
    min_facts: 80
  repo_status:
    clean: true
  diagnostics:
    min_total_facts: 80
    min_indexed_files: 17
    max_warnings: 0
scenarios:
  - id: tinyusb_target_profile_name
    kind: verify_claim
    claim:
      claim_type: target_profile
      subject: name
      object: tinyusb-device-cdc-msc-stm32f407disco-none
    expect:
      verdict: supported
      reason_code: target_profile_supported
      supporting_must_include:
        - fact_type: target_profile
          predicate: selected_profile
          subject: tinyusb-device-cdc-msc-stm32f407disco-none

  - id: tinyusb_target_profile_board
    kind: verify_claim
    claim:
      claim_type: target_profile
      subject: board
      object: stm32f407disco
    expect:
      verdict: supported
      reason_code: target_profile_supported
      supporting_must_include:
        - fact_type: target_profile
          predicate: target_attribute
          subject: board
          object: stm32f407disco

  - id: tinyusb_target_profile_role
    kind: verify_claim
    claim:
      claim_type: target_profile
      subject: usb_role
      object: device
    expect:
      verdict: supported
      reason_code: target_profile_supported
      supporting_must_include:
        - fact_type: target_profile
          predicate: target_attribute
          subject: usb_role
          object: device

  - id: tinyusb_target_profile_active_port
    kind: verify_claim
    claim:
      claim_type: target_profile
      subject: active_port
      object: src/portable/synopsys/dwc2
    expect:
      verdict: supported
      reason_code: target_profile_supported
      supporting_must_include:
        - fact_type: target_profile
          predicate: target_attribute
          subject: active_port
          object: src/portable/synopsys/dwc2

  - id: tinyusb_build_config_cdc_enabled
    kind: verify_claim
    claim:
      claim_type: build_config
      subject: CFG_TUD_CDC
      object: "1"
    expect:
      verdict: supported
      reason_code: build_config_macro_value_supported
      supporting_must_include:
        - fact_type: build_config
          predicate: macro_value
          subject: CFG_TUD_CDC
          object: "1"

  - id: tinyusb_build_config_msc_enabled
    kind: verify_claim
    claim:
      claim_type: build_config
      subject: CFG_TUD_MSC
      object: "1"
    expect:
      verdict: supported
      reason_code: build_config_macro_value_supported
      supporting_must_include:
        - fact_type: build_config
          predicate: macro_value
          subject: CFG_TUD_MSC
          object: "1"

  - id: tinyusb_build_config_hid_inactive
    kind: verify_claim
    claim:
      claim_type: build_config
      subject: CFG_TUD_HID
      object: "0"
    expect:
      verdict: supported
      reason_code: build_config_macro_value_supported
      supporting_must_include:
        - fact_type: build_config
          predicate: macro_value
          subject: CFG_TUD_HID
          object: "0"

  - id: tinyusb_selected_dwc2_dcd_active
    kind: verify_claim
    claim:
      claim_type: file_active
      subject: src/portable/synopsys/dwc2/dcd_dwc2.c
      object: active
    expect:
      verdict: supported
      reason_code: target_file_selection_supported
      supporting_must_include:
        - fact_type: target_file
          predicate: file_active
          subject: src/portable/synopsys/dwc2/dcd_dwc2.c
          payload_contains:
            selection_status: active
            active_port: src/portable/synopsys/dwc2

  - id: tinyusb_nonselected_stm32_fsdev_dcd_inactive
    kind: verify_claim
    claim:
      claim_type: file_active
      subject: src/portable/st/stm32_fsdev/dcd_stm32_fsdev.c
      object: inactive
    expect:
      verdict: supported
      reason_code: target_file_selection_supported
      supporting_must_include:
        - fact_type: target_file
          predicate: file_inactive
          subject: src/portable/st/stm32_fsdev/dcd_stm32_fsdev.c
          payload_contains:
            selection_status: inactive
            selection_reasons:
              - non_selected_port

  - id: tinyusb_hid_device_source_inactive
    kind: verify_claim
    claim:
      claim_type: file_active
      subject: src/class/hid/hid_device.c
      object: inactive
    expect:
      verdict: supported
      reason_code: target_file_selection_supported
      supporting_must_include:
        - fact_type: target_file
          predicate: file_inactive
          subject: src/class/hid/hid_device.c
          payload_contains:
            selection_status: inactive
            selection_reasons:
              - not_in_compile_commands

  - id: tinyusb_main_calls_tusb_init
    kind: verify_text
    text: main calls tusb_init
    expect:
      overall_verdict: supported
      verdicts_include:
        - claim_type: calls
          subject: main
          object: tusb_init
          verdict: supported

  - id: tinyusb_tusb_init_calls_dcd_init
    kind: verify_text
    text: tusb_init calls dcd_init
    expect:
      overall_verdict: supported
      verdicts_include:
        - claim_type: calls
          subject: tusb_init
          object: dcd_init
          verdict: supported


  - id: tinyusb_configuration_descriptor_macro
    kind: verify_claim
    claim:
      claim_type: usb_descriptor_semantic
      subject: TUD_CONFIG_DESCRIPTOR
      object: desc_fs_configuration
      payload:
        predicate: defines_configuration_descriptor
    expect:
      verdict: supported
      reason_code: usb_descriptor_semantic_supported
      supporting_must_include:
        - fact_type: usb_descriptor
          predicate: defines_configuration_descriptor
          subject: TUD_CONFIG_DESCRIPTOR
          object: desc_fs_configuration
          payload_path_equals:
            resolved_arguments.interface_count: 3
            resolved_arguments.total_length: 98

  - id: tinyusb_cdc_descriptor_macro
    kind: verify_claim
    claim:
      claim_type: usb_descriptor_semantic
      subject: CDC
      object: desc_fs_configuration
      payload:
        class: CDC
        interface_symbol: ITF_NUM_CDC
        endpoint_symbol: EPNUM_CDC_IN
    expect:
      verdict: supported
      reason_code: usb_descriptor_semantic_supported
      supporting_must_include:
        - fact_type: usb_descriptor
          predicate: defines_class_interface_descriptor
          subject: CDC
          object: desc_fs_configuration
          payload_contains:
            usb_class: CDC
            interface_symbol: ITF_NUM_CDC
          payload_list_contains:
            endpoint_symbols: EPNUM_CDC_IN
          payload_path_equals:
            resolved_arguments.endpoint_size: 64
            endpoint_directions.EPNUM_CDC_IN: in

  - id: tinyusb_msc_descriptor_macro
    kind: verify_claim
    claim:
      claim_type: usb_descriptor_semantic
      subject: MSC
      object: desc_fs_configuration
      payload:
        class: MSC
        interface_symbol: ITF_NUM_MSC
        endpoint_symbol: EPNUM_MSC_OUT
    expect:
      verdict: supported
      reason_code: usb_descriptor_semantic_supported
      supporting_must_include:
        - fact_type: usb_descriptor
          predicate: defines_class_interface_descriptor
          subject: MSC
          object: desc_fs_configuration
          payload_contains:
            usb_class: MSC
            interface_symbol: ITF_NUM_MSC
          payload_list_contains:
            endpoint_symbols: EPNUM_MSC_OUT
          payload_path_equals:
            resolved_arguments.endpoint_size: 64
            endpoint_directions.EPNUM_MSC_OUT: out

  - id: tinyusb_device_descriptor_callback_provider
    kind: verify_claim
    claim:
      claim_type: usb_descriptor_semantic
      subject: tud_descriptor_device_cb
      object: desc_device
      payload:
        predicate: provides_descriptor_callback
        descriptor_kind: device
    expect:
      verdict: supported
      reason_code: usb_descriptor_semantic_supported
      supporting_must_include:
        - fact_type: usb_descriptor
          predicate: provides_descriptor_callback
          subject: tud_descriptor_device_cb
          object: desc_device
          payload_contains:
            descriptor_kind: device
            callback_name: tud_descriptor_device_cb
            returned_descriptor: desc_device

  - id: tinyusb_configuration_descriptor_callback_provider
    kind: verify_claim
    claim:
      claim_type: usb_descriptor_semantic
      subject: tud_descriptor_configuration_cb
      object: desc_fs_configuration
      payload:
        predicate: provides_descriptor_callback
        descriptor_kind: configuration
    expect:
      verdict: supported
      reason_code: usb_descriptor_semantic_supported
      supporting_must_include:
        - fact_type: usb_descriptor
          predicate: provides_descriptor_callback
          subject: tud_descriptor_configuration_cb
          object: desc_fs_configuration
          payload_contains:
            descriptor_kind: configuration
            callback_name: tud_descriptor_configuration_cb
            returned_descriptor: desc_fs_configuration

  - id: tinyusb_mount_weak_default_detected
    kind: verify_claim
    claim:
      claim_type: tinyusb_callback_semantic
      subject: tud_mount_cb
      payload:
        predicate: declares_weak_callback_default
        linkage: weak
        callback_family: device_lifecycle
        callback_requirement: optional_weak_default
    expect:
      verdict: supported
      reason_code: tinyusb_callback_semantic_supported
      supporting_must_include:
        - fact_type: tinyusb_callback
          predicate: declares_weak_callback_default
          subject: tud_mount_cb
          object: weak_default
          payload_contains:
            callback_name: tud_mount_cb
            linkage: weak
            callback_family: device_lifecycle
            callback_requirement: optional_weak_default

  - id: tinyusb_mount_application_override_detected
    kind: verify_claim
    claim:
      claim_type: tinyusb_callback_semantic
      subject: tud_mount_cb
      payload:
        predicate: overrides_weak_callback
        override_status: overridden_by_application
    expect:
      verdict: supported
      reason_code: tinyusb_callback_semantic_supported
      supporting_must_include:
        - fact_type: tinyusb_callback
          predicate: overrides_weak_callback
          subject: tud_mount_cb
          payload_contains:
            callback_name: tud_mount_cb
            override_status: overridden_by_application
            weak_default_available: true
            application_override: true
            weak_definition_path: src/device/usbd.c
            application_definition_path: examples/device/cdc_msc/src/main.c

  - id: tinyusb_configuration_descriptor_callback_is_application_provider
    kind: verify_claim
