          predicate: indirect_dispatches_to_driver_callback
          subject: dcd_event_xfer_complete
          object: xfer_cb
          payload_contains:
            dispatch_function: dcd_event_xfer_complete
            callback_field: xfer_cb
            via_function: get_driver
            map_name: ep2drv
            map_kind: endpoint_to_driver_map
            uses_endpoint_map: true


  - id: tinyusb_usbd_edpt_xfer_async_submit
