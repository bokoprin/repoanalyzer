      claim_type: tinyusb_callback_semantic
      subject: tud_descriptor_configuration_cb
      payload:
        predicate: declares_tinyusb_callback_implementation
        callback_family: descriptor
        callback_requirement: application_descriptor_provider
        application_path: true
    expect:
      verdict: supported
      reason_code: tinyusb_callback_semantic_supported
      supporting_must_include:
        - fact_type: tinyusb_callback
          predicate: declares_tinyusb_callback_implementation
          subject: tud_descriptor_configuration_cb
          object: application_callback
          payload_contains:
            callback_family: descriptor
            callback_requirement: application_descriptor_provider
            provider_kind: descriptor_callback_provider
            application_path: true

  - id: tinyusb_cdc_optional_weak_callback_not_overridden
    kind: verify_claim
    claim:
      claim_type: tinyusb_callback_semantic
      subject: tud_cdc_line_state_cb
      payload:
        predicate: declares_weak_callback_default
