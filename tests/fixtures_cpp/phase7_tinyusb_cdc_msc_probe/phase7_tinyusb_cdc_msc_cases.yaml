            driver_class: CDC
            driver_table: _usbd_driver
            config_macro: CFG_TUD_CDC
          payload_list_contains:
            callback_symbols: cdcd_open

  - id: tinyusb_cdc_open_callback_binding_detected
    kind: verify_claim
    claim:
      claim_type: tinyusb_driver_dispatch_semantic
