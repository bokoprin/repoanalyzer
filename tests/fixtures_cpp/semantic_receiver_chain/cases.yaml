      must_include:
        - fact_type: call
          caller: sakura::CViewCommander::Command_MEMBER_CHAIN
          callee: sakura::Inner::method
          call_kind: member_direct
          payload_contains:
            resolution_status: resolved
            receiver_type_resolved: sakura::Inner
